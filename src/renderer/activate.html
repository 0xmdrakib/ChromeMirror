<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate Chrome Mirror</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="stylesheet" href="design-system.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-lockup">
        <span class="auth-brand">
          <img src="icon.png" alt="Chrome Mirror" />
        </span>
        <span>
          <strong>Chrome Mirror</strong>
          <small>Official desktop</small>
        </span>
      </div>
      <h1>Activate Chrome Mirror</h1>
      <p class="sub">Enter the license key you received to activate this device.</p>

      <form id="activateForm" autocomplete="off">
        <input
          id="keyInput"
          class="key-input"
          type="text"
          aria-label="License key"
          placeholder="CMIR-XXXX-XXXX-XXXX-XXXX"
          spellcheck="false"
          autocapitalize="characters"
          inputmode="text"
          maxlength="24"
          required
        />
        <button class="auth-btn" id="activateBtn" type="submit">Activate</button>
      </form>

      <div id="errorBox" class="auth-error" hidden></div>

      <p class="auth-foot">
        One computer can hold the license at a time. Release it from the web
        portal before moving to another computer.
      </p>
    </div>
  </div>

  <div id="toast" class="auth-toast" hidden></div>

  <script src="license-key.js"></script>
  <script src="activate.js"></script>
</body>
</html>
