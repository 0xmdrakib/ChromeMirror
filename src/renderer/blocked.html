<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Mirror - Locked</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="stylesheet" href="design-system.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-lockup">
        <span class="auth-brand">
          <img src="icon.png" alt="Chrome Mirror" />
        </span>
        <span>
          <strong>Chrome Mirror</strong>
          <small>Official desktop</small>
        </span>
      </div>
      <div class="block-icon">
        <span data-lucide="lock-keyhole" data-lucide-size="30"></span>
      </div>
      <h1 id="title">Access Locked</h1>
      <p class="sub" id="message">
        Your license is no longer active on this device. Please contact the
        administrator to restore access.
      </p>

      <button class="auth-btn" id="retryBtn" type="button">Retry</button>
      <p class="retry-status" id="retryStatus" role="status" aria-live="polite"></p>

      <p class="auth-foot">
        If you believe this is an error, share this device's details with your
        administrator.
      </p>
    </div>
  </div>

  <script src="lucide-icons.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
