name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      LICENSE_API_URL: ${{ vars.LICENSE_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate hosted API URL
        shell: pwsh
        run: |
          if (-not $env:LICENSE_API_URL) {
            throw "Set the LICENSE_API_URL repository variable before publishing a release."
          }
          if (-not $env:LICENSE_API_URL.StartsWith("https://")) {
            throw "LICENSE_API_URL must use HTTPS."
          }

      - run: npm ci
      - run: npm run lint:desktop
      - run: npm test
      - run: npm run dist

      - name: Create installer-only ZIP
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter "Chrome-Mirror-*-win-x64.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not generated."
          }
          $zipPath = [System.IO.Path]::ChangeExtension($installer.FullName, ".zip")
          Compress-Archive -LiteralPath $installer.FullName -DestinationPath $zipPath -Force

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-mirror-windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.zip
