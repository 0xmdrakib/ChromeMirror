name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      LICENSE_API_URL: ${{ vars.LICENSE_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate hosted API URL
        shell: pwsh
        run: |
          if (-not $env:LICENSE_API_URL) {
            throw "Set the LICENSE_API_URL repository variable before publishing a release."
          }
          if (-not $env:LICENSE_API_URL.StartsWith("https://")) {
            throw "LICENSE_API_URL must use HTTPS."
          }

      - run: npm ci
      - run: npm run lint:desktop
      - run: npm test
      - run: npm run dist

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -LiteralPath dist -File |
            Where-Object { $_.Extension -in ".exe", ".zip" }
          if ($artifacts.Count -lt 2) {
            throw "Expected both the installer and ZIP artifacts."
          }
          $lines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -LiteralPath $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($artifact.Name)"
          }
          $lines | Set-Content -LiteralPath dist/SHA256SUMS.txt -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-mirror-windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.zip
            dist/SHA256SUMS.txt
